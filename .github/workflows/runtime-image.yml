# Builds & publishes the public Cirrus runtime image (backend/runtime-image/Dockerfile)
# to GHCR on a native amd64 runner. Push triggers only when the image or this
# workflow changes; also runnable on demand via the Actions tab (workflow_dispatch).
#
# Uses the built-in GITHUB_TOKEN (packages: write) to push to the repo owner's
# namespace — no PAT needed. NOTE: a freshly created GHCR package is PRIVATE; after
# the first successful run, set its visibility to Public once in the package settings
# so users' own sandbox keys (a different org) can pull it.
name: runtime-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/runtime-image/**'
      - '.github/workflows/runtime-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: backend/runtime-image
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/liu9293/cirrus-runtime:latest
            ghcr.io/liu9293/cirrus-runtime:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
